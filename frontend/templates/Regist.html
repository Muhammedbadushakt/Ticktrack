{% extends "base.html" %}
{% block title %}Register{%endblock%}

{% block style %}
<style>
    :root {
        --bgr: rgba(12, 58, 104, 0.1);
    }

    /* --- Container & Layout Fixes --- */
    .page-content {
        display: flex;
        justify-content: center;
        align-items: flex-start; /* Align to top so scrolling starts correctly */
        min-height: 100vh;
        padding: 80px 20px 40px 20px; /* Space for nav bar and bottom breathing room */
        overflow-y: auto; /* Ensure the content area itself is scrollable */
    }

    .form-container {
        width: 100%;
        max-width: 800px;
        background: rgba(5, 5, 5, 0.75);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-top: 2px solid var(--primary);
        border-radius: 8px;
        padding: 2.5rem;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        position: relative;
        opacity: 0;
        animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Tech Corner Accents */
    .form-container::before, .form-container::after {
        content: '';
        position: absolute;
        width: 15px;
        height: 15px;
        border: 2px solid var(--primary);
    }
    .form-container::before { top: 10px; left: 10px; border-right: 0; border-bottom: 0; }
    .form-container::after { bottom: 10px; right: 10px; border-left: 0; border-top: 0; }

    .form-header {
        text-align: center;
        margin-bottom: 2rem;
        grid-column: 1 / -1;
    }

    .form-header h2 {
        font-family: 'Oswald', sans-serif;
        font-size: 2rem;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 0 0 10px var(--primary);
    }

    /* --- Grid System --- */
    .REGISTER {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.2rem 2rem;
    }

    /* --- Mobile Responsive Fix --- */
    @media (max-width: 768px) {
        .REGISTER { 
            grid-template-columns: 1fr; /* Force single column */
        } 
        .form-container { 
            padding: 1.5rem;
            margin-top: 20px;
        }
        .form-header h2 { font-size: 1.6rem; }
        
        /* Ensure the body or main wrapper allows scrolling */
        body { overflow-y: auto !important; } 
    }

    .input-group {
        display: flex;
        flex-direction: column;
    }

    label {
        font-family: 'Rajdhani', sans-serif;
        font-weight: 700;
        font-size: 0.8rem;
        color: var(--primary);
        margin-bottom: 0.4rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    input, select {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 10px 15px;
        color: #fff;
        font-family: 'Rajdhani', sans-serif;
        font-size: 1rem;
        border-radius: 4px;
        transition: all 0.3s ease;
    }

    input:focus, select:focus {
        border-color: var(--primary);
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        outline: none;
    }

    /* Phone Input Layout */
    .phone-input {
        display: flex;
        gap: 8px;
    }
    .phone-input select { width: 90px; font-size: 0.9rem; }
    .phone-input input { flex: 1; }

    /* --- Button Style --- */
    #register-btn {
        grid-column: 1 / -1;
        margin-top: 1.5rem;
        padding: 12px;
        background: transparent;
        border: 1px solid var(--primary);
        color: var(--primary);
        font-family: 'Oswald', sans-serif;
        font-size: 1.1rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    #register-btn:hover {
        background: var(--primary);
        color: #000;
        box-shadow: 0 0 20px var(--primary);
    }

    /* Error Messages */
    p[id$="-info"] {
        color: #ff0055;
        font-size: 0.75rem;
        margin-top: 4px;
        min-height: 1rem;
        font-family: 'Rajdhani', sans-serif;
    }

    .invalid {
        border-color: #ff0055 !important;
    }
</style>
{% endblock %}

{% block content %} 
    <section class="form-container">
        <form action="{{url_for('auth.register')}}" method="POST" class="REGISTER">
            
            <div class="form-header">
                <h2>Initialize Student</h2>
                <p>Digital Identity Creation</p>
            </div>

            <!-- Identity Section -->
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" name="name" id="name" required placeholder="Real Name">
                <p id="name-info"></p>
            </div>

            <div class="input-group">
                <label for="username">Access Username</label>
                <input type="text" name="username" id="username" minlength="6" maxlength="15" placeholder="Unique ID">
                <p id="username-info"></p>
            </div>

            <!-- Security Section -->
            <div class="input-group">
                <label for="password">Security Key</label>
                <input type="password" name="password" id="password" placeholder="••••••••">
                <p id="password-info"></p>
            </div>

            <div class="input-group">
                <label for="confirm">Verify Key</label>
                <input type="password" name="confirm" id="confirm" placeholder="••••••••">
                <p id="confirm-info"></p>
            </div>

            <!-- Academic Section -->
            <div class="input-group">
                <label for="Student-id">University ID</label>
                <input type="text" name="Student-id" id="Student-id" required placeholder="Reg No.">
                <p id="Studentid-info"></p>
            </div>

            <div class="input-group">
                <label for="department">Department</label>
                <input type="text" name="department" id="department" required placeholder="C.S.A / E.C.E">
                <p id="Department-info"></p>
            </div>

            <div class="input-group">
                <label for="Roll-no">Roll Number</label>
                <input type="number" name="Roll-no" id="Roll-no" placeholder="Batch No.">
                <p id="Rollno-info"></p>
            </div>

            <div class="input-group">
                <label for="Yoa">Admission Date</label>
                <input type="date" name="Yoa" id="Yoa">
                <p id="Yoa-info"></p>
            </div>

            <!-- Personal Section -->
            <div class="input-group">
                <label for="dob">Birth Date</label>
                <input name="dob" id="dob" type="date" required>
                <p id="dob-info"></p>
            </div>

            <div class="input-group">
                <label for="phone">Link Phone</label>
                <div class="phone-input">
                    <select id="country-code" name="country-code">
                        <option value="+91" selected>+91 IN</option>
                        <option value="+1">+1 US</option>
                        <option value="+44">+44 UK</option>
                    </select>
                    <input type="tel" name="number" id="number" placeholder="Mobile No." maxlength="10" required>
                </div>
                <p id="number-info"></p>
            </div>

            <div class="input-group" style="grid-column: 1 / -1;">
                <label for="email">Neural Mail (Email)</label>
                <input type="email" id="email" name="email" placeholder="student@cusat.ac.in" required>
                <p id="email-info"></p>
            </div>

            <div class="input-group" style="grid-column: 1 / -1;">
                <label for="address">Residential Coordinates</label>
                <input type="text" name="address" id="address" placeholder="Full Address">
                <p id="address-info"></p>
            </div>

            <button id="register-btn" type="submit">Deploy Registration</button>
            <p id="info"></p>
        </form>
    </section>
{% endblock %}

{% block script %}
    <script>
        class Person {
            constructor(username,name,password,confirm,studentid,dept,dob,number,email,yoa,rollno,address,userarray =[]){
                this.userarray = userarray;
                this.username = username;
                this.name = name;
                this.password = password;
                this.confirm  = confirm;
                this.studentid = studentid;
                this.dept = dept;
                this.dob  = dob;
                this.number = number;
                this.email  = email;
                this.yoa    = yoa;
                this.rollno    = rollno;
                this.address   = address;    
            }
             isValid() {
                return (
                    this._username &&
                    this._name &&
                    this._password &&
                    this._confirm &&
                    this._studentid &&
                    this._dept &&
                    this._dob &&
                    this._number &&
                    this._email &&
                    this._yoa &&
                    this._rollno &&
                    this._address
                );
            }
            
            // Helper to manage visual validation styles
            _setValid(id, isValid) {
                const el = document.getElementById(id);
                if(isValid) el.classList.remove('invalid');
                else el.classList.add('invalid');
            }

            set username(value) {
                this._setValid("username", false);
                if (this.userarray.includes(value)) {
                    document.getElementById("username-info").textContent = "Username exists";
                    this._username = null;
                } else if (value.trim() === "") {
                    document.getElementById("username-info").textContent = "Username required";
                    this._username = null;
                } else {
                    this._username = value;
                    this._setValid("username", true);
                }
            }
            get username() { return this._username; }
            
            set name(value){
                this._setValid("name", false);
                if(value.length < 3 || value.length >20){
                    document.getElementById('name-info').textContent = 'Name must be 3–20 characters';
                    this._name = null;
                } else if ( !value || value.trim() === ' '){
                    document.getElementById('name-info').textContent = 'Name is required';
                    this._name = null;
                } else {
                    this._name = value;
                    this._setValid("name", true);
                }
            } 
            get name(){ return this._name; }
            
            set password(value) {
                this._setValid("password", false);
                const strongPassword = /^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
                if (strongPassword.test(value)) {
                    this._password = value;
                    this._setValid("password", true);
                } else {
                    document.getElementById("password-info").textContent =
                        "Must include uppercase, number, and special character.";
                    this._password = null;
                }
            }              
            get password() { return this._password; }
            
            set confirm(value) {
                this._setValid("confirm", false);
                if (this._password === value) {
                    this._confirm = value;
                    this._setValid("confirm", true);
                } else {
                    document.getElementById("confirm-info").textContent = "Password not matching";
                    this._confirm = null;
                }
            }
            get confirm() { return this._confirm; }
            
            set studentid(value){
                this._setValid("Student-id", false);
                if(!value || value.trim() === ""){
                    document.getElementById("Studentid-info").textContent ="Student ID required";
                    this._studentid = null;
                } else {
                    this._studentid = value;
                    this._setValid("Student-id", true);
                }
            }
            get studentid(){ return this._studentid; }
            
            set dept(value) {
                this._setValid("department", false);
                if (!value || value.trim() === "") {
                    document.getElementById("Department-info").textContent ="Department required";
                    this._dept = null;
                } else {
                    this._dept = value.trim();
                    this._setValid("department", true);
                }
            }
            get dept() { return this._dept; }
            
            set dob(value) {
                this._setValid("dob", false);
                if (!value) {
                    document.getElementById("dob-info").textContent = "Date of birth required";
                    this._dob = null;
                } else {
                    this._dob = value;
                    this._setValid("dob", true);
                }
            }
            get dob() { return this._dob; }
            
            set number(value) {
                this._setValid("number", false);
                if (/^[0-9]{10}$/.test(value)) {
                    this._number = value;
                    this._setValid("number", true);
                } else {
                    document.getElementById("number-info").textContent = "Invalid number";
                    this._number = null;
                }
            }
            get number() { return this._number; }
            
            set email(value) {
                this._setValid("email", false);
                if (value.includes("@")) {
                    this._email = value;
                    this._setValid("email", true);
                } else {
                    document.getElementById("email-info").textContent = "Invalid format";
                    this._email = null;
                }
            }
            get email() { return this._email; }
            
            set yoa(value) {
                this._setValid("Yoa", false);
                if (!value) {
                    document.getElementById("Yoa-info").textContent ="Year of admission required";
                    this._yoa = null;
                } else {
                    this._yoa = value;
                    this._setValid("Yoa", true);
                }
            }
            get yoa() { return this._yoa; }
            
            set rollno(value) {
                this._setValid("Roll-no", false);
                if (!value) {
                    document.getElementById("Rollno-info").textContent = "Roll number required";
                    this._rollno = null;
                }else {
                    this._rollno = value;
                    this._setValid("Roll-no", true);
                }
            }
            get rollno() { return this._rollno; }
            
            set address(value) {
                this._setValid("address", false);
                if (!value || value.trim() === "") {
                    document.getElementById("address-info").textContent ="Address required";
                    this._address = null;
                } else {
                    this._address = value.trim();
                    this._setValid("address", true);
                }
            }
            get address() { return this._address; }
        }

        function clearErrors() {
            const errors = document.querySelectorAll("p[id$='-info']");
            errors.forEach(p => p.textContent = "");
            const inputs = document.querySelectorAll('.invalid');
            inputs.forEach(i => i.classList.remove('invalid'));
        }
        
        // Safe loading of user array
        let user = [];
        try {
            user = {{username | default([])| tojson }};
        } catch(e) { console.log("Static mode"); }

        const form = document.querySelector(".REGISTER");
        form.addEventListener("submit", function(event) {
            event.preventDefault();
            clearErrors(); 
           
            let p1 = new Person(
                document.getElementById("username").value,
                document.getElementById("name").value,
                document.getElementById("password").value,
                document.getElementById("confirm").value,
                document.getElementById("Student-id").value,
                document.getElementById("department").value,
                document.getElementById("dob").value,
                document.getElementById("number").value,
                document.getElementById("email").value,
                document.getElementById("Yoa").value,
                document.getElementById("Roll-no").value,
                document.getElementById("address").value,
                user
            );

            if (p1.isValid()) {
                // Ideally replace this with a custom modal for better UX
                window.alert("Registered Successfully");
                form.submit();
            } else {
                document.getElementById("info").textContent = "Please fix the errors ❌";
            }
        });
    </script>
{%endblock%}

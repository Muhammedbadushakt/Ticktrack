{% extends "base.html" %}
{% block title %}Register{%endblock%}

{% block style %}
<style>
    /* --- Container & Layout --- */
    .page-content {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh; 
    }

    .form-container {
        width: 100%;
        max-width: 900px;
        background: rgba(5, 5, 5, 0.75);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-top: 1px solid var(--primary); /* Top accent line */
        border-radius: 4px; /* Tech-sharp corners */
        padding: 3rem;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        position: relative;
        overflow: hidden;
    }

    /* Decorative corner accents */
    .form-container::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 20px; height: 20px;
        border-top: 2px solid var(--primary);
        border-left: 2px solid var(--primary);
    }
    .form-container::after {
        content: '';
        position: absolute;
        bottom: 0; right: 0; width: 20px; height: 20px;
        border-bottom: 2px solid var(--primary);
        border-right: 2px solid var(--primary);
    }

    .form-header {
        text-align: center;
        margin-bottom: 2.5rem;
        /* Make header span the full width of the grid */
        grid-column: 1 / -1; 
    }

    .form-header h2 {
        font-family: 'Oswald', sans-serif;
        font-size: 2.5rem;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin: 0;
        text-shadow: 0 0 10px var(--primary);
    }
    
    .form-header p {
        font-family: 'Rajdhani', sans-serif;
        color: rgba(255,255,255,0.6);
        margin-top: 0.5rem;
        letter-spacing: 1px;
    }

    /* --- Grid System --- */
    .REGISTER {
        display: grid;
        grid-template-columns: 1fr 1fr; /* 2 Columns */
        gap: 1.5rem 2rem;
    }

    @media (max-width: 768px) {
        .REGISTER { grid-template-columns: 1fr; } /* Stack on mobile */
        .form-container { padding: 1.5rem; }
    }

    /* --- Input Groups (The Fix) --- */
    .input-group {
        display: flex;
        flex-direction: column;
        position: relative;
    }

    label {
        font-family: 'Rajdhani', sans-serif;
        font-weight: 700;
        font-size: 0.9rem;
        color: var(--primary);
        margin-bottom: 0.5rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    input, select {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 12px 15px;
        color: #fff;
        font-family: 'Rajdhani', sans-serif;
        font-size: 1.1rem;
        border-radius: 2px;
        transition: all 0.3s ease;
        outline: none;
    }

    input[type="date"] {
        color-scheme: dark;
    }

    input:focus, select:focus {
        border-color: var(--primary);
        background: rgba(0, 0, 0, 0.7);
        box-shadow: 0 0 15px rgba(var(--primary-rgb), 0.2);
    }

    ::placeholder {
        color: rgba(255, 255, 255, 0.3);
    }

    /* --- Error Handling --- */
    p[id$="-info"] {
        color: var(--accent);
        font-size: 0.8rem;
        margin-top: 5px;
        min-height: 1.2em;
        font-weight: 600;
        opacity: 0;
        transition: opacity 0.3s;
    }

    p[id$="-info"]:not(:empty) {
        opacity: 1;
    }

    input.invalid {
        border-color: var(--accent) !important;
        box-shadow: 0 0 10px var(--accent);
    }

    /* --- Phone Input Specifics --- */
    .phone-input {
        display: flex;
        gap: 10px;
    }
    .phone-input select {
        width: 110px;
        cursor: pointer;
    }
    .phone-input input {
        flex: 1;
    }

    /* --- Button --- */
    #register-btn {
        grid-column: 1 / -1; /* Span full width */
        margin-top: 1rem;
        padding: 15px;
        background: transparent;
        border: 1px solid var(--primary);
        color: var(--primary);
        font-family: 'Oswald', sans-serif;
        font-size: 1.2rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    #register-btn::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 100%; height: 100%;
        background: var(--primary);
        transition: all 0.3s ease;
        z-index: -1;
    }

    #register-btn:hover {
        color: #000;
        box-shadow: 0 0 20px var(--primary);
    }
    
    #register-btn:hover::before {
        left: 0;
    }

    #info {
        grid-column: 1 / -1;
        text-align: center;
        color: var(--accent);
        font-weight: bold;
        margin-top: 1rem;
        text-transform: uppercase;
    }
</style>
{% endblock %}

{% block content %} 
    <section class="form-container">
        <form action="{{url_for('auth.register')}}" method="POST" class="REGISTER">
            
            <!-- Header Section (Full Width) -->
            <div class="form-header">
                <h2>Student Registration</h2>
                <p>Enter your details to proceed</p>
            </div>

            <!-- Row 1 -->
            <div class="input-group">
                <label for="name">Name</label>
                <input type="text" name="name" id="name" required placeholder="Full Name">
                <p id="name-info"></p>
            </div>

            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" minlength="6" maxlength="15" placeholder="Username">
                <p id="username-info"></p>
            </div>

            <!-- Row 2 -->
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Strong Password">
                <p id="password-info"></p>
            </div>

            <div class="input-group">
                <label for="confirm">Confirm Password</label>
                <input type="password" name="confirm" id="confirm" placeholder="Confirm Password">
                <p id="confirm-info"></p>
            </div>

            <!-- Row 3 -->
            <div class="input-group">
                <label for="Student-id">Student ID</label>
                <input type="text" name="Student-id" id="Student-id" required placeholder="ID Number">
                <p id="Studentid-info"></p>
            </div>

            <div class="input-group">
                <label for="department">Department</label>
                <input type="text" name="department" id="department" required placeholder="Dept. Name">
                <p id="Department-info"></p>
            </div>

            <!-- Row 4 -->
            <div class="input-group">
                <label for="dob">Date Of Birth</label>
                <input name="dob" id="dob" type="date" required>
                <p id="dob-info"></p>
            </div>

            <div class="input-group">
                <label for="phone">Phone Number</label>
                <div class="phone-input">
                    <select id="country-code" name="country-code">
                        <option value="+1">+1 USA</option>
                        <option value="+91" selected>+91 India</option>
                        <option value="+44">+44 UK</option>
                        <option value="+61">+61 Australia</option>
                    </select>
                    <input type="tel" name="number" id="number" placeholder="1234567890" maxlength="10" required>
                </div>
                <p id="number-info"></p>
            </div>

            <!-- Row 5 -->
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
                <p id="email-info"></p>
            </div>

            <div class="input-group">
                <label for="Yoa">Year of Admission</label>
                <input type="date" name="Yoa" id="Yoa">
                <p id="Yoa-info"></p>
            </div>

            <!-- Row 6 -->
            <div class="input-group">
                <label for="Roll-no">Roll Number</label>
                <input type="number" name="Roll-no" id="Roll-no" placeholder="Roll No">
                <p id="Rollno-info"></p>
            </div>

            <div class="input-group">
                <label for="address">Address</label>
                <input type="text" name="address" id="address" placeholder="City, Street">
                <p id="address-info"></p>
            </div>

            <!-- Full Width Button -->
            <button id="register-btn" type="submit">Initialize Registration</button>
            <p id="info"></p>
        </form>
    </section>
{% endblock %}

{% block script %}
    <script>
        class Person {
            constructor(username,name,password,confirm,studentid,dept,dob,number,email,yoa,rollno,address,userarray =[]){
                this.userarray = userarray;
                this.username = username;
                this.name = name;
                this.password = password;
                this.confirm  = confirm;
                this.studentid = studentid;
                this.dept = dept;
                this.dob  = dob;
                this.number = number;
                this.email  = email;
                this.yoa    = yoa;
                this.rollno    = rollno;
                this.address   = address;    
            }
             isValid() {
                return (
                    this._username &&
                    this._name &&
                    this._password &&
                    this._confirm &&
                    this._studentid &&
                    this._dept &&
                    this._dob &&
                    this._number &&
                    this._email &&
                    this._yoa &&
                    this._rollno &&
                    this._address
                );
            }
            
            // Helper to manage visual validation styles
            _setValid(id, isValid) {
                const el = document.getElementById(id);
                if(isValid) el.classList.remove('invalid');
                else el.classList.add('invalid');
            }

            set username(value) {
                this._setValid("username", false);
                if (this.userarray.includes(value)) {
                    document.getElementById("username-info").textContent = "Username exists";
                    this._username = null;
                } else if (value.trim() === "") {
                    document.getElementById("username-info").textContent = "Username required";
                    this._username = null;
                } else {
                    this._username = value;
                    this._setValid("username", true);
                }
            }
            get username() { return this._username; }
            
            set name(value){
                this._setValid("name", false);
                if(value.length < 3 || value.length >20){
                    document.getElementById('name-info').textContent = 'Name must be 3–20 characters';
                    this._name = null;
                } else if ( !value || value.trim() === ' '){
                    document.getElementById('name-info').textContent = 'Name is required';
                    this._name = null;
                } else {
                    this._name = value;
                    this._setValid("name", true);
                }
            } 
            get name(){ return this._name; }
            
            set password(value) {
                this._setValid("password", false);
                const strongPassword = /^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
                if (strongPassword.test(value)) {
                    this._password = value;
                    this._setValid("password", true);
                } else {
                    document.getElementById("password-info").textContent =
                        "Must include uppercase, number, and special character.";
                    this._password = null;
                }
            }              
            get password() { return this._password; }
            
            set confirm(value) {
                this._setValid("confirm", false);
                if (this._password === value) {
                    this._confirm = value;
                    this._setValid("confirm", true);
                } else {
                    document.getElementById("confirm-info").textContent = "Password not matching";
                    this._confirm = null;
                }
            }
            get confirm() { return this._confirm; }
            
            set studentid(value){
                this._setValid("Student-id", false);
                if(!value || value.trim() === ""){
                    document.getElementById("Studentid-info").textContent ="Student ID required";
                    this._studentid = null;
                } else {
                    this._studentid = value;
                    this._setValid("Student-id", true);
                }
            }
            get studentid(){ return this._studentid; }
            
            set dept(value) {
                this._setValid("department", false);
                if (!value || value.trim() === "") {
                    document.getElementById("Department-info").textContent ="Department required";
                    this._dept = null;
                } else {
                    this._dept = value.trim();
                    this._setValid("department", true);
                }
            }
            get dept() { return this._dept; }
            
            set dob(value) {
                this._setValid("dob", false);
                if (!value) {
                    document.getElementById("dob-info").textContent = "Date of birth required";
                    this._dob = null;
                } else {
                    this._dob = value;
                    this._setValid("dob", true);
                }
            }
            get dob() { return this._dob; }
            
            set number(value) {
                this._setValid("number", false);
                if (/^[0-9]{10}$/.test(value)) {
                    this._number = value;
                    this._setValid("number", true);
                } else {
                    document.getElementById("number-info").textContent = "Invalid number";
                    this._number = null;
                }
            }
            get number() { return this._number; }
            
            set email(value) {
                this._setValid("email", false);
                if (value.includes("@")) {
                    this._email = value;
                    this._setValid("email", true);
                } else {
                    document.getElementById("email-info").textContent = "Invalid format";
                    this._email = null;
                }
            }
            get email() { return this._email; }
            
            set yoa(value) {
                this._setValid("Yoa", false);
                if (!value) {
                    document.getElementById("Yoa-info").textContent ="Year of admission required";
                    this._yoa = null;
                } else {
                    this._yoa = value;
                    this._setValid("Yoa", true);
                }
            }
            get yoa() { return this._yoa; }
            
            set rollno(value) {
                this._setValid("Roll-no", false);
                if (!value) {
                    document.getElementById("Rollno-info").textContent = "Roll number required";
                    this._rollno = null;
                }else {
                    this._rollno = value;
                    this._setValid("Roll-no", true);
                }
            }
            get rollno() { return this._rollno; }
            
            set address(value) {
                this._setValid("address", false);
                if (!value || value.trim() === "") {
                    document.getElementById("address-info").textContent ="Address required";
                    this._address = null;
                } else {
                    this._address = value.trim();
                    this._setValid("address", true);
                }
            }
            get address() { return this._address; }
        }

        function clearErrors() {
            const errors = document.querySelectorAll("p[id$='-info']");
            errors.forEach(p => p.textContent = "");
            const inputs = document.querySelectorAll('.invalid');
            inputs.forEach(i => i.classList.remove('invalid'));
        }
        
        // Safe loading of user array
        let user = [];
        try {
            user = {{username | default([])| tojson }};
        } catch(e) { console.log("Static mode"); }

        const form = document.querySelector(".REGISTER");
        form.addEventListener("submit", function(event) {
            event.preventDefault();
            clearErrors(); 
           
            let p1 = new Person(
                document.getElementById("username").value,
                document.getElementById("name").value,
                document.getElementById("password").value,
                document.getElementById("confirm").value,
                document.getElementById("Student-id").value,
                document.getElementById("department").value,
                document.getElementById("dob").value,
                document.getElementById("number").value,
                document.getElementById("email").value,
                document.getElementById("Yoa").value,
                document.getElementById("Roll-no").value,
                document.getElementById("address").value,
                user
            );

            if (p1.isValid()) {
                // Ideally replace this with a custom modal for better UX
                window.alert("Registered Successfully");
                form.submit();
            } else {
                document.getElementById("info").textContent = "Please fix the errors ❌";
            }
        });
    </script>
{%endblock%}

{% extends "base.html" %}
{% block title %}User{%endblock%}
{% block style %}
    <style>
        :root {
            --bgr: rgba(12, 58, 104, 0.1);
        }
        .page-content{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding-top: 10vh;
        }
        .User{
            display:flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            font-family: 'Rajdhani', sans-serif;
            width: auto;
            padding: 1rem;
        }
        .User input,
        .User select{
            width: 100%;
            max-width: 420px;
            padding: 12px 20px;
            font-size: 1.1rem;
            color: white;
            background: var(--bgr);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            outline: none;
            margin-left: 2rem;
            opacity: 0;
            animation: slideUp 0.8s ease forwards;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }
        .User button{
            font-size: 90%;
            width: 100px;
            padding: 10px;
            cursor: pointer;
            color: white;
            background: var(--bgr);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            outline: none;
            opacity: 0;
            animation: slideUp 0.8s ease forwards;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }


        .User input:nth-of-type(1) {
            animation-delay: 0.2s;
        }

        .User input:nth-of-type(2) {
            animation-delay: 0.4s;
        }

        .User select {
            animation-delay: 0.6s;
        }

        .User button {
            animation-delay: 0.8s;
        }

        .User input:hover,
        .User select:hover,
        .User button:hover {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }
        .cont{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: -1px;
            width: 100%;
            max-width: 420px;             
        }
        .button-row{
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .register-btn{
           display: inline-block;
            padding: 0;
            text-align: center;
            font-size: 0.95rem;
            color: white;
            background: none;
            border: none;
            text-decoration: none;
            opacity: 0;
            animation: slideUp 0.8s ease forwards;
            animation-delay: 1s;
            transition: color 0.3s ease;
        }
        .register-btn:hover {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: underline;
        }
        #info {
            margin: 0;
            padding: 12px 20px;
            text-align: center;
            font-size: 1rem;
            color: white;
            width: 100%;
            max-width: 420px;
            opacity: 0;
            animation: slideUp 0.8s ease forwards;
            animation-delay: 1.2s;
        }
        #info:empty {
            display: none;
        }
        @media (max-width: 600px) {
            .page-content {
                padding-top: 100vh;
            }
            .User {
                gap: 1.2rem;
                width: 100%;
                max-width: 360px;
            }

            .User input,
            .User select
            {
                max-width: 100%;
                font-size: 1rem;
                padding: 10px 16px;
            }
            .page-content {
                padding: 1.5rem;
            }
            .User button {
                width: 140px;
                font-size: 0.95rem;
                padding: 10px;
            }

            .cont {
                max-width: 360px;
                padding: 1.5rem;
            }

            #info {
                max-width: 100%;
                font-size: 0.95rem;
            }
        }

    </style>
{%endblock%}
{% block content %}
<div class="cont">
    <form class="User" method="POST" action="{{ url_for('auth.login')}}">
        <input type="text" name="Username" id="Username" placeholder="Username">
        <input type="password" name="password"  placeholder="Password">
        <select id="Role" name="Role">
            <option value="Admin">Admin</option>
            <option value="Cr">Class Representative</option>
            <option value="St">Student</option>
        </select>
        <div class="button-row">
            <button id="LOGIN">LOGIN</button>

            <a href="{{ url_for('auth.register') }}" class="register-btn">
                REGISTER
            </a>

            <a href="{{ url_for('auth.forgot_password') }}" class="register-btn">
                FORGOT PASSWORD
            </a>
        </div>
    </form>
    <p id="info">{{msg}}</p>
</div>

{%endblock%}
{% block script %}
{%endblock%}

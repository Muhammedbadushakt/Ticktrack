{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}

<div class="cont">

    <form class="User" method="POST">

        <input type="password"
               name="password"
               placeholder="New Password">

        <input type="password"
               name="confirm"
               placeholder="Confirm Password">

        <button type="submit">
            RESET PASSWORD
        </button>

    </form>

    <p id="info">{{ msg }}</p>

</div>

{% endblock %}
